{% extends "base.html" %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h2 class="card-title">Reset Password</h2>
  </div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}
    {% if password_feedback %}
      <div class="alert alert-warning" role="alert">
        <strong>Password needs improvement:</strong>
        <ul>
          {% for feedback in password_feedback %}
            <li>{{ feedback }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}
    
    <form method="POST">
      <div class="field">
        <label class="label">New Password</label>
        <input type="password" name="password" id="password" class="input" placeholder="Enter new password" required onkeyup="checkPasswordStrength()">
        <div id="password-strength-meter" class="password-strength-meter">
          <div class="strength-bar">
            <div id="strength-fill" class="strength-fill"></div>
          </div>
          <div id="strength-text" class="strength-text">Enter a password</div>
          <div id="strength-feedback" class="strength-feedback"></div>
        </div>
      </div>
      
      <div class="field">
        <label class="label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="input" placeholder="Confirm new password" required>
      </div>
      
      <div class="field mt-4">
        <button type="submit" class="btn btn-primary">Reset Password</button>
        <a href="{{ url_for('login') }}" class="btn btn-ghost">Back to Login</a>
      </div>
    </form>
  </div>
</div>

<script>
  function checkPasswordStrength() {
    const password = document.getElementById('password').value;
    const strengthFill = document.getElementById('strength-fill');
    const strengthText = document.getElementById('strength-text');
    const strengthFeedback = document.getElementById('strength-feedback');
    
    if (password.length === 0) {
      strengthFill.style.width = '0%';
      strengthFill.className = 'strength-fill';
      strengthText.textContent = 'Enter a password';
      strengthFeedback.innerHTML = '';
      return;
    }
    
    // This is a client-side simulation - in a real implementation, this would come from the server
    let score = 0;
    let feedback = [];
    
    // Length check
    if (password.length >= 12) {
      score += 25;
    } else if (password.length >= 8) {
      score += 15;
      feedback.push('Use at least 12 characters for a stronger password');
    } else {
      score += 5;
      feedback.push('Password must be at least 8 characters long');
    }
    
    // Character variety checks
    if (/[a-z]/.test(password)) {
      score += 15;
    } else {
      feedback.push('Include lowercase letters');
    }
    
    if (/[A-Z]/.test(password)) {
      score += 15;
    } else {
      feedback.push('Include uppercase letters');
    }
    
    if (/\d/.test(password)) {
      score += 15;
    } else {
      feedback.push('Include numbers');
    }
    
    if (/[^a-zA-Z\d]/.test(password)) {
      score += 15;
    } else {
      feedback.push('Include special characters (!@#$%^&* etc.)');
    }
    
    // Complexity checks
    if (new Set(password).size >= password.length * 0.75) {
      score += 15;
    } else {
      feedback.push('Avoid repetitive characters');
    }
    
    // Common password patterns check
    const commonPatterns = [
      '123456', 'password', 'qwerty', 'abc123', 'admin', 'letmein',
      'welcome', 'monkey', 'dragon', 'master', 'football', 'shadow',
      'ashley', 'sunshine', '!@#$%^&*', '0987654321', '111111'
    ];
    
    let isCommon = false;
    for (const pattern of commonPatterns) {
      if (password.toLowerCase().includes(pattern)) {
        isCommon = true;
        break;
      }
    }
    
    if (!isCommon) {
      score += 15;
    } else {
      feedback.push('Avoid common password patterns');
    }
    
    // Ensure score is between 0 and 100
    score = Math.max(0, Math.min(100, score));
    
    // Update UI based on score
    strengthFill.style.width = score + '%';
    
    if (score < 50) {
      strengthFill.className = 'strength-fill weak';
      strengthText.textContent = 'Weak Password';
      strengthText.className = 'strength-text weak';
    } else if (score < 75) {
      strengthFill.className = 'strength-fill medium';
      strengthText.textContent = 'Medium Password';
      strengthText.className = 'strength-text medium';
    } else {
      strengthFill.className = 'strength-fill strong';
      strengthText.textContent = 'Strong Password';
      strengthText.className = 'strength-text strong';
    }
    
    // Display feedback
    if (feedback.length > 0) {
      strengthFeedback.innerHTML = '<ul>' + feedback.map(f => `<li>${f}</li>`).join('') + '</ul>';
    } else {
      strengthFeedback.innerHTML = '';
    }
  }
</script>

<style>
  /* Password strength meter */
  .password-strength-meter {
    margin-top: 10px;
  }
  
  .strength-bar {
    width: 100%;
    height: 8px;
    background-color: #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  
  .strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s ease, background-color 0.3s ease;
  }
  
  .strength-fill.weak {
    background-color: #ff4d4d;
  }
  
  .strength-fill.medium {
    background-color: #ffcc00;
  }
  
  .strength-fill.strong {
    background-color: #4caf50;
  }
  
  .strength-text {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  
  .strength-text.weak {
    color: #ff4d4d;
  }
  
  .strength-text.medium {
    color: #ffcc00;
  }
  
  .strength-text.strong {
    color: #4caf50;
  }
  
  .strength-feedback {
    font-size: 12px;
    color: #666;
  }
  
  .strength-feedback ul {
    margin: 0;
    padding-left: 20px;
  }
  
  .strength-feedback li {
    margin-bottom: 4px;
  }
  
  .alert-warning {
    background: rgba(255, 193, 7, 0.2);
    border: 1px solid rgba(255, 193, 7, 0.3);
    color: #856404;
  }
</style>
{% endblock %}
